name: Deploy to cPanel via Git

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Commit build artifacts for cPanel
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -f dist/
          git status
          git diff --cached --quiet || git commit -m "chore: add build artifacts for cPanel deployment [skip ci]"

      - name: Push build branch to GitHub
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: cpanel-deploy
          force: true

      - name: Trigger cPanel Git Pull via API
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
          CPANEL_DOMAIN: ${{ secrets.CPANEL_DOMAIN }}
          CPANEL_REPO_DIR: ${{ secrets.CPANEL_REPO_DIR }}
        run: |
          echo "Triggering cPanel Git pull..."
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: cpanel $CPANEL_USER:$CPANEL_TOKEN" \
            "https://${CPANEL_DOMAIN}:2083/execute/VersionControl/update?repository_root=${CPANEL_REPO_DIR}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::cPanel deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Deployment triggered successfully!"
