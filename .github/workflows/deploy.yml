name: Deploy to cPanel via Git

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy dist contents to cpanel-release branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Clone the existing cpanel-release branch to a temporary directory
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git clone --branch cpanel-release --single-branch "$REPO_URL" deploy-temp || {
            echo "Branch cpanel-release does not exist. Creating it."
            mkdir deploy-temp
            cd deploy-temp
            git init
            git checkout -b cpanel-release
            cd ..
          }
          
          # Clean old files in deploy-temp to catch deletions, but keep .git
          cd deploy-temp
          # Remove all tracked files
          git rm -rf . || true
          # Clean untracked files
          git clean -fdx
          
          # Copy all new files from dist, including hidden ones
          cp -a ../dist/. .
          
          # Configure Git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Add and commit
          git add .
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          
          # Push to update the remote branch (this will be a fast-forward)
          git push "$REPO_URL" cpanel-release
          cd ..

      - name: Trigger cPanel Git Pull via API
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
          CPANEL_REPO_DIR: ${{ secrets.CPANEL_REPO_DIR }}
        run: |
          echo "Triggering cPanel Git pull..."
          ENCODED_DIR=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$CPANEL_REPO_DIR', safe=''))")

          # Update the branch tracked by cPanel to cpanel-release and trigger deployment via .cpanel.yml
          echo "Setting cPanel repo branch to cpanel-release and pulling..."
          RESPONSE=$(curl -sS -k -w "\n%{http_code}" \
            -H "Authorization: cpanel $CPANEL_USER:$CPANEL_TOKEN" \
            -H "Host: gnexuset.com" \
            "https://91.204.209.29:2083/execute/VersionControl/update?repository_root=${ENCODED_DIR}&branch=cpanel-release")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::cPanel update failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Deployment triggered successfully!"
