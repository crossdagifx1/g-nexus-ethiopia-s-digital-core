name: Deploy to cPanel via Git

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Create Deployment Zip
        run: |
          cd dist
          zip -r ../deploy.zip .
          cd ..

      - name: Upload Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.CPANEL_REPO_DIR }}/
          exclude: |
            **/.git*
            **/.git*/**
            node_modules/**
            src/**
            public/**
            supabase/**
            *.json
            *.ts
            *.js
            *.config.*
            README.md
            bun.lockb
            .lovable/**
            *.log
            *.txt

      - name: Trigger Extraction
        run: |
          curl -sS "https://gnexuset.com/extract.php?token=gnexus-deploy-2026"
          echo "✅ Deployment extraction triggered!"
