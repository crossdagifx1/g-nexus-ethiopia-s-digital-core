name: Deploy to cPanel via Git

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy dist contents to cpanel-deploy branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Fetch existing branch or create it if it doesn't exist
          git fetch origin cpanel-deploy || git checkout --orphan cpanel-deploy && git rm -rf . && git commit --allow-empty -m "initial commit" && git push origin cpanel-deploy

          # Use a separate directory to prepare the deployment commit
          rm -rf /tmp/cpanel-deploy
          git clone --branch cpanel-deploy --single-branch "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" /tmp/cpanel-deploy

          # Clear the deployment repo except .git
          find /tmp/cpanel-deploy -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +

          # Copy dist contents to the deployment repo
          cp -r dist/* /tmp/cpanel-deploy/

          cd /tmp/cpanel-deploy
          git add -A
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to deploy"
          git push origin cpanel-deploy

      - name: Trigger cPanel Git Pull via API
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
          CPANEL_REPO_DIR: ${{ secrets.CPANEL_REPO_DIR }}
        run: |
          echo "Triggering cPanel Git pull..."
          ENCODED_DIR=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$CPANEL_REPO_DIR', safe=''))")

          # Step 1: Update the branch tracked by cPanel to cpanel-deploy
          echo "Setting cPanel repo branch to cpanel-deploy..."
          curl -sS -k \
            -H "Authorization: cpanel $CPANEL_USER:$CPANEL_TOKEN" \
            -H "Host: gnexuset.com" \
            "https://91.204.209.29:2083/execute/VersionControl/update?repository_root=${ENCODED_DIR}&branch=cpanel-deploy" || true

          # Step 2: Trigger deployment pull
          RESPONSE=$(curl -sS -k -w "\n%{http_code}" \
            -H "Authorization: cpanel $CPANEL_USER:$CPANEL_TOKEN" \
            -H "Host: gnexuset.com" \
            "https://91.204.209.29:2083/execute/VersionControl/deploy?repository_root=${ENCODED_DIR}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::cPanel deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Deployment triggered successfully!"
